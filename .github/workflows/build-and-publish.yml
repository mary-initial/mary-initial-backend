name: Build and Publish Backend

on:
  push:
    branches:
      - main
    paths:
      - backend/*
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags:
            - "mary-initial/mary-initial-backend/backend:latest"
            - "mary-initial/mary-initial-backend/backend:build-${{ github.run_number }}"
          cache-from: "type=registry,ref=ghcr.io/mary-initial/mary-initial-backend/backend:cache"
          cache-to: "type=registry,ref=ghcr.io/mary-initial/mary-initial-backend/backend:cache"
          platforms: linux/amd64
          context: backend/
