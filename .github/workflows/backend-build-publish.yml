name: Backend Build and Publish

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/**
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      env:
        REGISTRY: ghcr.io
        REPO_NAME: ${{ github.repository }}
    outputs:
      image-tag: ${{ steps.export-tag.outputs.image-tag }}
    steps:
      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            "ghcr.io/mary-initial/mary-initial-backend/backend:latest"
            "ghcr.io/mary-initial/mary-initial-backend/backend:build-${{ github.run_number }}"
          cache-from: "type=registry,ref=ghcr.io/mary-initial/mary-initial-backend/backend:cache"
          cache-to: "type=registry,ref=ghcr.io/mary-initial/mary-initial-backend/backend:cache"
          platforms: linux/amd64
          context: backend/

      - name: Export image tag
        id: export-tag
        run: echo "image-tag=build-${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    needs: [build]
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: "${{ secrets.AZURE_CLIENT_ID }}"
      ARM_TENANT_ID: "${{ secrets.AZURE_TENANT_ID }}"
      ARM_SUBSCRIPTION_ID: "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
    steps:
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Write Backend Config
        run: |
          echo "storage_account_name=${{ secrets.TF_STORAGE_ACCOUNT_NAME }}" >> backend-config.tfvars
          echo "key=${{ secrets.TF_KEY }}" >> backend-config.tfvars

      - name: Terraform Init
        run: terraform init -backend-config=backend-config.tfvars -migrate-state -input=false

      - name: Write Terraform Variables
        run: |
          echo "appId=${{ secrets.AZURE_APP_ID }}" >> terraform.tfvars
          echo "password=${{ secrets.AZURE_PASSWORD }}" >> terraform.tfvars
          echo "ghcr_token=${{ secrets.GHCR_TOKEN }}" >> terraform.tfvars
          echo "ghcr_username=${{ secrets.GHCR_USERNAME }}" >> terraform.tfvars
          echo "image-tag=${{ needs.build.outputs.image-tag }}" >> terraform.tfvars

      - name: Terraform Apply
        run: terraform apply -auto-approve
